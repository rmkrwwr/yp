<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}расписание{% endblock %}</title>
    <style>
        body { font-family: Arial; margin: 0; padding: 0; }
        header { background: #333; color: white; padding: 15px; }
        nav { background: #444; padding: 10px; }
        nav a { color: white; margin: 10px; text-decoration: none; }
        main { padding: 20px; min-height: 400px; }
        footer { background: #333; color: white; text-align: center; padding: 10px; margin-top: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background: #f2f2f2; }
        .error { color: red; }
    </style>
</head>
<body>
    <header>
        <h1>{% block header %}система управления курсами{% endblock %}</h1>
    </header>

    <nav>
        <a href="{% url 'teacher_list' %}">список преподавателей</a>
        <a href="{% url 'course_list' %}">список курсов</a>
        <a href="{% url 'teacher_create' %}">добавить преподавателя</a>
        <a href="{% url 'course_create' %}">добавить курс</a>
    </nav>

    <main>
        {% if messages %}
        <div style="background: #d4edda; padding: 10px; margin: 10px 0;">
            {% for message in messages %}
                {{ message }}
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>лабораторная работа 3 - django формы</p>
    </footer>
</body>
</html>
