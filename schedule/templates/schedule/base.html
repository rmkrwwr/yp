<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Расписание{% endblock %}</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        nav { background: #333; padding: 10px; }
        nav a { color: white; margin: 10px; text-decoration: none; }
        .messages { background: #d4edda; padding: 10px; margin: 10px 0; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f2f2f2; }
        .btn { padding: 5px 10px; background: #007bff; color: white; text-decoration: none; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'teacher_list' %}">преподаватели</a>
        <a href="{% url 'course_list' %}">курсы</a>
        <a href="{% url 'student_list' %}">студенты</a>
        <a href="{% url 'orm_queries' %}">ORM запросы</a>
    </nav>

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
            {{ message }}
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}
</body>
</html>
